<!DOCTYPE html>
    <html lang="ko">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>내 추천 기록</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
</head>

<body class="bg-[#F7F6F4] min-h-screen">
<div class="px-6 py-5">
    <!-- 상단 헤더 -->
    <div class="flex items-center justify-between mb-10">
        <button onclick="history.back()">
            <iconify-icon icon="solar:alt-arrow-left-linear" class="text-3xl text-zinc-700"></iconify-icon>
        </button>
        <div class="font-bold items-center text-zinc-700 text-lg"> 얼마 받았더라? </div>
        <button>
        </button>
    </div>

    <!-- 타이틀 -->
    <h1 class="text-2xl leading-tight font-extrabold text-zinc-700 mb-4">
        저장한<br>
        추천 금액 불러오기
    </h1>
    <p class="text-zinc-500 text-lg leading-relaxed mb-12">
        추천 금액 저장에 사용된<br>
        이메일을 입력해주세요.
    </p>

    <!-- 이메일 카드 -->
    <div class="bg-white rounded-2xl p-5 border border-zinc-200 mb-4 shadow-sm">
        <label class="block text-sm font-semibold text-zinc-500 mb-3">
            이메일
        </label>
        <input type="email" placeholder="example@email.com" class="w-full outline-none text-lg">
    </div>

    <!-- 조회 버튼 -->
    <button onclick="location.href='history_list.html'" 
            class="w-full h-[64px] rounded-2xl bg-[#0D6EFD] text-white font-bold text-lg mb-10">
        내 기록 조회
    </button>

    <!-- 안내 -->
    <div class="mt-12">
        <p class="text-sm text-zinc-500 leading-relaxed">
            입력하신 이메일로 저장된 추천 결과를 조회할 수 있습니다.
            <br>
            앱 출시 후에도 동일한 기록을 그대로 연동할 수 있어요.
        </p>
    </div>
</div>

</body>
</html>
