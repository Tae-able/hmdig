<!DOCTYPE html>
<html lang="ko" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 얼마 받았더라? </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
    <link href="https://api.fontshare.com/v2/css?f[]=geist@400,500,600,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard'], display: ['Geist'] },
                    colors: { 
                        surface: { 50: '#FDFBF8' },
                        brand: {
                            600:'#0066FF',       /* 메인 text */
                            DEFAULT: '#0D6EFD',  /* 메인 button */ 
                            bg: '#E8F2FF'        /* 연한 배경용 블루 */
                        }
                    }
                }
            }
        }
    </script>


<body class="bg-surface-50 flex flex-col justify-center items-center min-h-screen gap-4">
    <div class="w-full min-h-screen bg-surface-50 flex flex-col justify-between p-6 relative">
        <div class="flex flex-col items-center w-full text-center px-2">
            <div class="w-16 h-16 bg-blue-70 rounded-full flex items-center justify-center mb-6">
                
            </div>
            <div class="w-16 h-16 bg-blue-70 rounded-full flex items-center justify-center mb-6">
                <iconify-icon icon="solar:letter-opened-bold-duotone" class="text-3xl text-blue-700"></iconify-icon>
            </div>

            <h2 class="text-xl font-extrabold text-zinc-950 tracking-tight mb-2">
                📧 이메일 입력하고<br>
                추천 금액을 저장해보세요!
            </h2>
            <p class="text-sm text-zinc-500 mb-8">
                언제나 쉽게 조회할 수 있어요.<br>
                앱 출시 후에도 기록을 그대로 불러올 수 있어요.
            </p>
            
            <div class="w-full flex flex-col gap-4">
                <input 
                    type="email" 
                    id="email-input" 
                    placeholder="이메일을 입력해주세요" 
                    class="w-full bg-white border border-zinc-200 rounded-xl px-4 py-3.5 text-sm text-zinc-900 placeholder-zinc-300 focus:outline-none focus:border-zinc-900 font-medium transition-all"
                >
                
                <button onclick="submitFinalData()" class="w-full bg-brand text-white font-bold py-3.5 rounded-full text-lg hover:bg-brand/80 transition-all">
                    저장하기
                </button>
            </div>

            <div class="flex items-center justify-center gap-2 mt-5 text-[11px] text-zinc-400 font-medium">
                <input 
                    type="checkbox" 
                    id="privacy-agree" 
                    class="w-3.5 h-3.5 rounded border-zinc-300 text-zinc-900 focus:ring-0 cursor-pointer"
                >
                <label Aks="privacy-agree" class="cursor-pointer select-none">
                    개인정보 수집 및 이용에 동의합니다.
                </label>
            </div>
            <a href="#" class="text-[10px] text-zinc-400 underline mt-1 block">자세히 보기</a>
        </div>


        <!-- 하단 화살표 데코레이션 -->
        <div class="flex items-center justify-center mt-14 animate-bounce">
            <iconify-icon icon="solar:alt-arrow-down-linear" class="text-zinc-500 text-2xl"></iconify-icon>
        </div>

        <!-- 카드 뉴스 -->
        <div class="flex flex-col items-center gap-4 mt-6">
            <!-- 카드 1 -->
            <button class="relative w-full h-[110px] bg-blue-500 rounded-2xl px-5 py-4 overflow-hidden">
                <!-- <div class="absolute top-3 right-3 text-[11px] font-bold text-white/80"> 1/3 </div> -->
                <div class="h-full flex justify-between items-center">
                    <div class="text-left">
                        <p class="text-xs font-semibold text-blue-100 mb-1 drop-shadow">
                            가장 많이 보는 정보
                        </p>
                        <h3 class="text-xl font-extrabold text-white leading-snug drop-shadow">
                            친구 결혼식<br>
                            얼마 내야 할까?
                        </h3>
                    </div>
                    <div class="text-6xl opacity-90"> 💸 </div>
                </div>
            </button>

            <!-- 카드 2 -->
            <button class="relative w-full h-[110px] bg-blue-400 rounded-2xl px-5 py-4 overflow-hidden">
                <div class="h-full flex justify-between items-center">
                    <div class="text-left">
                        <p class="text-xs font-semibold text-blue-50 mb-1 drop-shadow">
                            사회초년생이 가장 궁금한
                        </p>
                        <h3 class="text-xl font-extrabold text-white leading-snug drop-shadow">
                            내 친구들은<br>
                            얼마 냈을까?
                        </h3>
                    </div>
                    <div class="text-6xl opacity-90">
                        📊
                    </div>
                </div>
            </button>

            <!-- 카드 3 -->
            <button class="relative w-full h-[110px] bg-blue-300 rounded-2xl px-5 py-4 overflow-hidden">
                <div class="h-full flex justify-between items-center">
                    <div class="text-left">
                        <p class="text-xs font-extrabold text-blue-50 mb-1 drop-shadow">
                            복사해서 바로 사용하는
                        </p>
                        <h3 class="text-xl font-extrabold text-white leading-snug drop-shadow">
                            상황별<br>
                            축하 문구 모음
                        </h3>
                    </div>
                    <div class="text-6xl opacity-90">
                        💌
                    </div>
                </div>
            </button>
        </div>
    </div>



    <div class="w-full max-w-[360px] bg-zinc-800 rounded-xl p-4 text-xs font-mono text-emerald-400 border border-zinc-700">
        <p class="font-bold text-white mb-1">📊 DB로 최종 발송 직전 적재 데이터셋 세팅 상태:</p>
        <pre id="debug-view">검증 중...</pre>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
        
        let supabase = null;
        if (SUPABASE_URL !== 'YOUR_SUPABASE_URL_HERE') {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        // 창고에서 한데 모은 데이터 검증 구조 생성
        const getFinalPayload = () => ({
            event_type: localStorage.getItem('event_type'),
            relation_type: localStorage.getItem('relation_type'),
            intimacy_level: localStorage.getItem('intimacy_level'),
            contact_frequency: localStorage.getItem('contact_frequency'),
            known_period: localStorage.getItem('known_period'),
            recommended_amount: localStorage.getItem('recommended_amount') ? parseInt(localStorage.getItem('recommended_amount')) : null,
            user_email: document.getElementById('email-input').value.trim()
        });

        window.onload = function() {
            // 하단 상태창에 현재 2~7번 거치며 저장된 원천 데이터 모형 실시간 노출
            document.getElementById('debug-view').textContent = JSON.stringify(getFinalPayload(), null, 2);
        };

        // 이메일 유효성 패턴 체크 함수
        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // 알림 신청하기 버튼 액션 함수
        async function submitFinalData() {
            const payload = getFinalPayload();
            const isAgreed = document.getElementById('privacy-agree').checked;

            // 1. 유효성 검사 (Validation)
            if (!payload.user_email) {
                alert("이메일 주소를 입력해 주세요.");
                return;
            }
            if (!validateEmail(payload.user_email)) {
                alert("올바른 이메일 형식이 아닙니다.");
                return;
            }
            if (!isAgreed) {
                alert("개인정보 수집 및 이용에 동의해야 신청이 가능합니다.");
                return;
            }

            // 앞선 단계의 핵심 값이 주소창 강제 진입 등으로 아예 비어있을 때의 컷팅 예외 처리
            if (!payload.event_type || !payload.recommended_amount) {
                alert("이전 선택 정보가 누락되었습니다. 첫 페이지부터 다시 시작해 주세요.");
                localStorage.clear();
                window.location.href = '5step.html';
                return;
            }

            // 2. Supabase 실 적재 기능 구동 연동 영역
            if (!supabase) {
                console.log("⚠️ Supabase가 아직 연동되지 않은 Mock 상태입니다. 수집 데이터 스펙을 시뮬레이션 출력합니다:");
                console.table(payload);
                alert("알림 신청 시뮬레이션 성공!\n(Supabase 연동 URL 키를 입력하면 실제 실시간 저장이 진행됩니다.)");
                
                // 임시 오프라인 성공 처리 흐름 유도
                localStorage.clear();
                window.location.href = '5step.html';
                return;
            }

            // 실제 인서트 전송
            const { data, error } = await supabase
                .from('survey_results') // 구축한 SQL 테이블명 대입
                .insert([payload]);

            if (error) {
                console.error("DB 적재 에러 로그:", error);
                alert("데이터 전송 중 오류가 발생했습니다. 개발자 도구의 콘솔 창을 확인하세요.");
            } else {
                console.log("DB 전송 완료:", data);
                alert("성공적으로 저장되었습니다!");
                
                // 다음 사람을 위한 로컬 창고 공간 초기화 및 첫 화면 백업 리다이렉트
                localStorage.clear();
                window.location.href = 'history_login.html';
            }
        }
    </script>
</body>
</html>
