<!DOCTYPE html>
<html lang="ko" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보 입력 - Cowalka</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
    <link href="https://api.fontshare.com/v2/css?f[]=geist@400,500,600,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard'], display: ['Geist'] },
                    colors: { 
                        surface: { 50: '#FDFBF8' },
                        brand: {
                            600:'#0066FF',       /* 메인 text */
                            DEFAULT: '#0D6EFD',  /* 메인 button */ 
                            bg: '#E8F2FF'        /* 연한 배경용 블루 */
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 💡 부드러운 스크롤 바 및 터치 바운스 제거 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2371717a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.25rem center;
            background-size: 0.9rem;
        }
        select:invalid { color: #a1a1aa; }
        select option { color: #27272a; }
    </style>
</head>
<body class="bg-surface-50 flex flex-col justify-center items-center min-h-screen gap-4">
    <div class="w-full min-h-screen bg-surface-50 flex flex-col justify-between p-6 relative">
    <!-- 
    <div class="w-full max-w-[360px] h-[640px] bg-surface-50 rounded-[2.5rem] shadow-2xl border-4 border-zinc-800 overflow-y-auto flex flex-col justify-between p-6 relative">
    -->
        <!-- 타이틀 좌측 정렬 배치 및 우측 상단 홈 아이콘 링크 구성 -->
        <div class="w-full pt-2 mb-6">
            <div class="flex justify-between items-start w-full">
                <div class="text-left pl-0.5">
                    <h2 class="font-display font-bold text-lg text-zinc-900 tracking-tight">맞춤 금액 추천</h2>
                    <!--<p class="text-xs font-medium text-zinc-400 mt-1.5 leading-relaxed">
                        관계와 친밀도를 입력하면<br>나에게 맞는 경조사비를 추천드려요!
                    </p>-->
                </div>
                <a href="index.html" class="w-8 h-8 flex items-center justify-center active:scale-95 transition-transform" title="홈으로 이동">
                    <iconify-icon icon="boxicons:home-filled" class="text-xl text-zinc-800"></iconify-icon>
                </a>
            </div>
        </div>

        <div class="w-full flex-1 flex flex-col justify-start pb-6">
            <div class="flex flex-col gap-6">
                <!-- 1번 문항 -->
                <div class="flex flex-col gap-2.5">
                    <div class="flex items-center gap-2 pl-0.5">
                        <!-- <span class="w-4 h-4 rounded-full bg-zinc-900 text-white flex items-center justify-center text-[10px] font-bold font-display">1</span> -->
                        <h3 class="text-sm font-bold text-zinc-800">어떤 행사인가요?</h3>
                    </div>
                    <select id="event_type" onchange="saveToStorage()" required class="w-full bg-white border border-zinc-200 text-zinc-800 text-xs font-semibold rounded-xl p-3 shadow-sm focus:outline-none focus:border-zinc-400">
                        <option value="" disabled selected hidden>선택해 주세요</option>
                        <option value="wedding">결혼식</option>
                        <option value="funeral">장례식</option>
                        <option value="first_birthday">돌잔치</option>
                        <option value="childbirth">출산 축하</option>
                        <option value="pregnancy">임신 축하</option>
                        <option value="promotion_retirement">승진 · 퇴직 축하</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2.5">
                    <div class="flex items-center gap-2 pl-0.5">
                        <!-- <span class="w-4 h-4 rounded-full bg-zinc-900 text-white flex items-center justify-center text-[10px] font-bold font-display">2</span> -->
                        <h3 class="text-sm font-bold text-zinc-900">마음을 전하실 분과의 관계는? </h3>
                    </div>
                    <select id="relation_type" onchange="saveToStorage()" required class="w-full bg-white border border-zinc-200 text-zinc-800 text-xs font-semibold rounded-xl p-3 shadow-sm focus:outline-none focus:border-zinc-400">
                        <option value="" disabled selected hidden>선택해 주세요</option>
                        <option value="friend">친구</option>
                        <option value="peer">직장 동료</option>
                        <option value="family">가족 (부모·형제·자매)</option>
                        <option value="relative">친척</option>
                        <option value="boss">직장 선배</option>
                        <option value="junior">직장 후배</option>
                        <option value="acquaintance">아는 지인</option>
                        <option value="client">비즈니스 파트너 (고객사)</option>
                    </select>
                    </select>
                </div>

                <div class="flex flex-col gap-2.5">
                    <div class="flex items-center gap-2 pl-0.5">
                        <!-- <span class="w-4 h-4 rounded-full bg-zinc-900 text-white flex items-center justify-center text-[10px] font-bold font-display">3</span> -->
                        <h3 class="text-sm font-bold text-zinc-900">얼마나 가깝다고 느끼나요?</h3>
                    </div>
                    <select id="intimacy_level" onchange="saveToStorage()" required class="w-full bg-white border border-zinc-200 text-zinc-800 text-xs font-semibold rounded-xl p-3 shadow-sm focus:outline-none focus:border-zinc-400">
                        <option value="" disabled selected hidden>선택해 주세요</option>
                        <option value="very_close">매우 친해요! 눈빛만 봐도 통하는 영혼의 단짝 ✨</option>
                        <option value="close">친해요! 개인톡도 편하게 하는 사이 💬</option>
                        <option value="acquaintance">보통이에요. 만나면 반갑지만, 둘만 남으면 살짝 뚝딱거림 🤖</option>
                        <option value="business">조금 어색해요... 프로필 사진 바뀌어도 모르는 사이 🫠</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2.5">
                    <div class="flex items-center gap-2 pl-0.5">
                        <!-- <span class="w-4 h-4 rounded-full bg-zinc-900 text-white flex items-center justify-center text-[10px] font-bold font-display">4</span> -->
                        <h3 class="text-sm font-bold text-zinc-900">최근 얼마나 자주 연락했나요?</h3>
                    </div>
                    <select id="contact_frequency" onchange="saveToStorage()" required class="w-full bg-white border border-zinc-200 text-zinc-800 text-xs font-semibold rounded-xl p-3 shadow-sm focus:outline-none focus:border-zinc-400">
                        <option value="" disabled selected hidden>선택해 주세요</option>
                        <option value="daily">거의 매일 연락</option>
                        <option value="weekly">주 1회 이상</option>
                        <option value="monthly">월 1회 이상</option>
                        <option value="few_months">몇 달에 한 번</option>
                        <option value="rarely">거의 없음</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2.5">
                    <div class="flex items-center gap-2 pl-0.5">
                        <!-- <span class="w-4 h-4 rounded-full bg-zinc-900 text-white flex items-center justify-center text-[10px] font-bold font-display">5</span> -->
                        <h3 class="text-sm font-bold text-zinc-900">알고 지낸 지 얼마나 됐나요?</h3>
                    </div>
                    <select id="known_period" onchange="saveToStorage()" required class="w-full bg-white border border-zinc-200 text-zinc-800 text-xs font-semibold rounded-xl p-3 shadow-sm focus:outline-none focus:border-zinc-400">
                        <option value="" disabled selected hidden>선택해 주세요</option>
                        <option value="over_5y">5년 이상</option>
                        <option value="3y_5y">3년 ~ 5년</option>
                        <option value="1y_3y">1년 ~ 3년</option>
                        <option value="under_1y">1년 미만</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="w-full pb-2">
            <button onclick="goToResult()" class="w-full bg-brand text-white font-bold py-3.5 rounded-full text-lg hover:bg-brand/80 transition-all flex items-center justify-center gap-1">
                금액 추천 받기
            </button>
        </div>
    </div>

    <div class="w-full max-w-[360px] justify-center bg-zinc-800 rounded-xl p-4 text-xs font-mono text-emerald-400 border border-zinc-700">
        <p class="font-bold text-white mb-1">📊 현재 localStorage 데이터 상태:</p>
        <pre id="debug-view">데이터 동기화 중...</pre>
    </div>

    <script>
        // 드롭다운 변경 시 자동으로 브라우저 내부에 데이터를 기록하고 모니터링창을 갱신하는 함수
        function saveToStorage() {
            const currentData = {
                event_type: document.getElementById('event_type').value,
                relation_type: document.getElementById('relation_type').value,
                intimacy_level: document.getElementById('intimacy_level').value,
                contact_frequency: document.getElementById('contact_frequency').value,
                known_period: document.getElementById('known_period').value
            };

            // 브라우저 로컬스토리지에 각각의 키값으로 세팅
            Object.keys(currentData).forEach(key => {
                localStorage.setItem(key, currentData[key]);
            });

            // 검은 상자(디버그 뷰)에 현재 저장된 데이터 세트 실시간 출력
            document.getElementById('debug-view').textContent = JSON.stringify(currentData, null, 2);
        }

        // 페이지가 처음 켜질 때 초기 값 강제 동기화 실행
        window.onload = function() {
            saveToStorage();
        };

        // 금액 추천 페이지로 전환
        // : 빈 값이 있는지 정밀 체크
        function goToResult() {
            const requiredFields = [
                { id: 'event_type', label: '어떤 행사인지' },
                { id: 'relation_type', label: '상대방과의 관계가 어떻게 되는지' },
                { id: 'intimacy_level', label: '얼마나 가까운 사이인지' },
                { id: 'contact_frequency', label: '최근 얼마나 자주 연락했는지' },
                { id: 'known_period', label: '알고 지낸 지 얼마나 되었는지' }
            ];

            // 루프를 돌면서 value가 비어있는("" 상태) 요소가 하나라도 있는지 수색
            for (let field of requiredFields) {
                const elementValue = document.getElementById(field.id).value;
                if (!elementValue) {
                    alert(`${field.label} 아직 선택하지 않으셨어요!`);
                    document.getElementById(field.id).focus(); // 미선택 항목으로 포커스 자동 매칭 이동
                    return; // 함수 탈출 (다음 페이지 이동 중단)
                }
            }
            window.location.href = 'recommend.html';
        }
    </script>
</body>
</html>
